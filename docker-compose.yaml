# Bot Hidratación Docker Compose - Production Ready (2026)

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_hidratacion
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bot-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  bot-network:
    driver: bridge

# Usage:
# - Development: docker-compose up --build
# - Production: docker-compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build