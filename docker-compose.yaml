version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot-hidratacion
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS:-}
      - REMINDER_INTERVAL=${REMINDER_INTERVAL:-60}
      - DEFAULT_GOAL_ML=${DEFAULT_GOAL_ML:-2000}
      - TIMEZONE=${TIMEZONE:-America/Mexico_City}
      - DB_PATH=/data/hydration_data.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - bot-data:/data
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot-network

volumes:
  bot-data:
    driver: local

networks:
  bot-network:
    driver: bridge

