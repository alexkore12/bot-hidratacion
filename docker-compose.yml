version: '3.8'

services:
  bot:
    build: .
    container_name: bot-hidratacion
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/hidratacion}
      - TZ=America/Mexico_City
    volumes:
      - .:/app
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: hidratacion-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: